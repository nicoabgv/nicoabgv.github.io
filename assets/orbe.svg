<svg width="128" height="128" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --pine: #3E5C42;
      --pine-dark: #28402C;
      --moss: #7C9A72;
      --clay: #C79762;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --pine: #6FA06F;
        --pine-dark: #2E2B22;
        --moss: #A9C79E;
        --clay: #D9A870;
      }
    }
    .pine-grad-start { stop-color: var(--pine); }
    .pine-grad-stop { stop-color: var(--pine-dark); }
    .glow-circle { fill: var(--pine); fill-opacity: 0.1; }
    .moss-stroke { stroke: var(--moss); }
    .clay-fill { fill: var(--clay); }
    .clay-stroke { stroke: var(--clay); }
    .moss-fill { fill: var(--moss); }
  </style>
  <defs>
    <linearGradient id="mainGrad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" class="pine-grad-start" />
      <stop offset="100%" class="pine-grad-stop" />
    </linearGradient>
    <radialGradient id="highlight" cx="8" cy="8" r="6" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.6" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Glow -->
  <circle cx="12" cy="12" r="10" class="glow-circle" filter="url(#softGlow)" />

  <!-- The Orbe Core -->
  <circle cx="12" cy="12" r="7" fill="url(#mainGrad)" filter="url(#softGlow)" />
  <circle cx="12" cy="12" r="7" fill="url(#highlight)" />

  <!-- Orbital Ring 1: Thick Glassy -->
  <circle cx="12" cy="12" r="9" stroke="white" stroke-width="0.75" stroke-opacity="0.2" />
  
  <!-- Orbital Ring 2: Dynamic Dash -->
  <path d="M12 2C17.5228 2 22 6.47715 22 12C22 17.5228 17.5228 22 12 22" class="moss-stroke" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="4 8" />
  <path d="M12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2" class="moss-stroke" stroke-width="1.5" stroke-linecap="round" />

  <!-- Technical Accents -->
  <circle cx="12" cy="2" r="1.5" class="clay-fill" />
  <circle cx="12" cy="2" r="0.75" fill="white" />
  
  <circle cx="12" cy="22" r="1" class="moss-fill" opacity="0.5" />
  
  <!-- Mini Satellite -->
  <path d="M22 12L24 12" class="clay-stroke" stroke-width="2" stroke-linecap="round" />
</svg>
